<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Trip - Trip Sheet System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>New Trip</h1>
    <div class="container">
        <input type="number" id="start_odometer" placeholder="Start Odometer">
        <input type="number" id="end_odometer" placeholder="End Odometer">
        <input type="number" step="any" id="start_lat" placeholder="Start Latitude">
        <input type="number" step="any" id="start_lon" placeholder="Start Longitude">
        <input type="number" step="any" id="end_lat" placeholder="End Latitude">
        <input type="number" step="any" id="end_lon" placeholder="End Longitude">
        <textarea id="notes" placeholder="Notes"></textarea>
        <button onclick="createTrip()">Submit</button>
        <button onclick="gotoLanding()">Back</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
